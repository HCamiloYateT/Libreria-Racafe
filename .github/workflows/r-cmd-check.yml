name: R CMD check (subpackages)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  r-cmd-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - racafeCore
          - racafeBD
          - racafeDrive
          - racafeGraph
          - racafeForecast
          - racafeShiny

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::rcmdcheck
            any::remotes
          needs: check

      - name: Install local Racafe dependencies
        run: |
          Rscript -e 'remotes::install_local(c("racafeCore", "racafeGraph", "racafeBD", "racafeDrive", "racafeForecast", "racafeShiny"), dependencies = TRUE, upgrade = "never", force = TRUE)'

      - name: Run R CMD check
        run: |
          Rscript -e "rcmdcheck::rcmdcheck('${{ matrix.package }}', args = c('--no-manual', '--as-cran'), error_on = 'warning')"
